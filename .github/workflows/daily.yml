name: Daily YouTube Summary

on:
  schedule:
    # 22:00 UTC = 07:00 Asia/Seoul
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check YouTube RSS feeds
        run: python src/main.py

      - name: Commit seen videos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update seen videos
          file_pattern: seen_videos.json
